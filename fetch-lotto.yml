name: 로또 데이터 주간 자동 수집

on:
  schedule:
    # 매주 토요일 21:30 (로또 추첨은 매주 토요일 20:35경 발표됨, 여유 시간 확보)
    - cron: '30 12 * * 6'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 최신 회차 데이터 수집
        run: node scripts/fetch-lotto.js

      - name: 변경사항 커밋
        run: |
          git config user.name "lotto-bot"
          git config user.email "lotto-bot@users.noreply.github.com"
          git add data/lotto-history.json
          git diff --staged --quiet || git commit -m "chore: 로또 데이터 자동 업데이트"
          git push
