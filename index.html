<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 번호 생성기 — 다양한 방식으로 뽑아보세요</title>
<meta name="description" content="완전 무작위, 홀짝 균형, 구간 고르게 등 다양한 방식으로 로또 번호를 뽑아보세요. 최근 당첨번호와 번호별 출현 통계도 함께 확인할 수 있어요.">
<meta property="og:type" content="website">
<meta property="og:title" content="산 로또, QR로 자동 저장하고 당첨 확인까지">
<meta property="og:description" content="번호 생성부터 QR 스캔 저장, 매주 자동 당첨확인까지.">
<meta property="og:url" content="https://warwickjjing.github.io/lotto_v1.0/">
<meta property="og:image" content="https://warwickjjing.github.io/lotto_v1.0/image/title.png">
<meta property="og:image:width" content="1024">
<meta property="og:image:height" content="541">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="로또 번호 생성기">
<meta name="twitter:description" content="완전 무작위, 홀짝 균형, 구간 고르게 등 다양한 방식으로 로또 번호를 뽑아보세요.">
<meta name="twitter:image" content="https://warwickjjing.github.io/lotto_v1.0/image/title.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#20232B;
    --ink-soft:#565B68;
    --paper:#F5F6F8;
    --line:#E1E3E9;
    --blue:#3B7BE0;
    --blue-deep:#2A5CB0;
    --blue-soft:#E8F0FD;
    --gold:#F2A93B;
    --ball1:#F6C144;
    --ball2:#5CA8ED;
    --ball3:#F26B6B;
    --ball4:#8D95A3;
    --ball5:#5EBE7A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    line-height:1.7;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 20px;}

  header{padding:36px 0 20px;text-align:center;}
  header h1{font-size:26px;font-weight:900;margin:0 0 8px;}
  header p{font-size:15px;color:var(--ink-soft);margin:0;}

  .dday-wrap{text-align:center;margin:0 0 22px;}
  .dday-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--blue-deep);color:#fff;
    font-weight:900;font-size:14px;
    padding:10px 20px;border-radius:999px;
  }
  .dday-badge.urgent{background:var(--gold);color:#20232B;}

  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:16px;
    padding:26px 24px;
    margin-bottom:22px;
  }
  .card h2{font-size:17px;font-weight:700;margin:0 0 16px;}

  .mode-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:20px;
  }
  @media(max-width:480px){.mode-grid{grid-template-columns:1fr;}}
  .mode-btn{
    padding:14px 12px;
    border:2px solid var(--line);
    border-radius:12px;
    background:#fff;
    cursor:pointer;
    text-align:left;
    font-family:inherit;
  }
  .mode-btn.active{border-color:var(--blue);background:var(--blue-soft);}
  .mode-btn .t{font-weight:700;font-size:15px;margin-bottom:3px;}
  .mode-btn .d{font-size:12.5px;color:var(--ink-soft);}

  .count-row{
    display:flex;align-items:center;gap:14px;margin-bottom:20px;
  }
  .count-row label{font-size:14px;font-weight:700;color:var(--ink-soft);}
  .count-row input[type=range]{flex:1;}
  .count-row .n{font-weight:900;font-size:18px;min-width:20px;text-align:center;}

  .gen-btn{
    width:100%;padding:18px;
    background:var(--blue);color:#fff;
    border:none;border-radius:12px;
    font-size:18px;font-weight:900;
    cursor:pointer;
  }
  .gen-btn:hover{background:var(--blue-deep);}
  .gen-btn:active{transform:scale(0.99);}

  .results{margin-top:22px;}
  .result-row{
    display:flex;align-items:center;gap:10px;
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .result-row:last-child{border-bottom:none;}
  .result-idx{font-size:13px;color:var(--ink-soft);width:20px;flex-shrink:0;}
  .balls{display:flex;gap:6px;flex-wrap:wrap;}
  .row-actions{margin-left:auto;flex-shrink:0;display:flex;gap:8px;}
  .copy-btn, .buy-btn{
    padding:7px 14px;
    border:1.5px solid var(--line);border-radius:8px;
    background:#fff;color:var(--ink-soft);
    font-size:12.5px;font-weight:700;font-family:inherit;
    cursor:pointer;transition:.15s;white-space:nowrap;
  }
  .copy-btn:hover, .buy-btn:hover{border-color:var(--blue);color:var(--blue);}
  .copy-btn.copied, .buy-btn.bought{background:var(--blue);border-color:var(--blue);color:#fff;}
  @media(max-width:480px){
    .result-row{flex-direction:column;align-items:stretch;}
    .row-actions{margin-left:0;width:100%;margin-top:8px;}
    .row-actions .copy-btn, .row-actions .buy-btn{flex:1;}
  }
  .copy-all-btn{
    display:block;width:100%;margin-top:14px;
    padding:14px;
    border:2px solid var(--blue);border-radius:12px;
    background:#fff;color:var(--blue);
    font-size:15px;font-weight:900;font-family:inherit;
    cursor:pointer;transition:.15s;
  }
  .copy-all-btn:hover{background:var(--blue-soft);}
  .copy-all-btn.copied{background:var(--blue);color:#fff;}
  .ball{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:900;font-size:14.5px;
    flex-shrink:0;
  }
  .ball.matched{box-shadow:0 0 0 2px #fff, 0 0 0 5px var(--gold);}
  .ball.bonus-matched{box-shadow:0 0 0 2px #fff, 0 0 0 5px var(--blue);}

  .my-num-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
  .my-num-header h2{margin:0;}
  .my-num-header-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .mini-action-btn{
    padding:8px 12px;border:1.5px solid var(--blue);border-radius:8px;
    background:#fff;color:var(--blue);font-weight:700;font-size:12.5px;
    cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .mini-action-btn:hover{background:var(--blue-soft);}

  .my-num-row{position:relative;padding:14px 0;border-bottom:1px solid var(--line);}
  .my-num-row:last-child{border-bottom:none;}
  .my-num-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

  .my-num-tooltip{
    position:absolute;left:0;right:0;top:100%;margin-top:10px;
    background:var(--ink);color:#fff;border-radius:12px;
    padding:12px 14px;box-shadow:0 10px 24px rgba(0,0,0,.18);
    opacity:0;visibility:hidden;pointer-events:none;
    transform:translateY(-4px);
    transition:opacity .15s, transform .15s;
    z-index:20;
  }
  .my-num-row:hover .my-num-tooltip{opacity:1;visibility:visible;transform:translateY(0);}
  .my-num-tooltip::before{
    content:'';position:absolute;top:-6px;left:24px;
    border-left:6px solid transparent;border-right:6px solid transparent;
    border-bottom:6px solid var(--ink);
  }
  .my-num-tooltip .tooltip-title{font-size:11.5px;font-weight:700;color:#fff;opacity:.7;margin-bottom:8px;}
  .my-num-tooltip .balls{gap:6px;align-items:center;}
  .my-num-del{
    margin-left:auto;flex-shrink:0;
    background:none;border:none;color:var(--ink-soft);
    font-size:12px;cursor:pointer;text-decoration:underline;
    padding:4px;font-family:inherit;
  }
  .my-num-del:hover{color:var(--ink);}
  .my-num-status{font-size:13px;font-weight:700;color:var(--ink-soft);margin-top:10px;}
  .my-num-status.win{color:var(--blue-deep);}

  .my-num-pager{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
  .my-num-pager button{
    padding:7px 14px;border:1.5px solid var(--line);border-radius:8px;
    background:#fff;color:var(--ink-soft);font-weight:700;font-size:12.5px;
    cursor:pointer;font-family:inherit;
  }
  .my-num-pager button:disabled{opacity:.4;cursor:not-allowed;}
  .my-num-pager span{font-size:12.5px;color:var(--ink-soft);font-weight:700;}

  .manual-picker{margin-top:16px;padding-top:16px;border-top:1px solid var(--line);}
  .manual-picker-grid{
    display:grid;grid-template-columns:repeat(9,1fr);gap:6px;margin-bottom:14px;
  }
  .manual-picker-num{
    aspect-ratio:1;border-radius:50%;
    border:1.5px solid var(--line);background:#fff;color:var(--ink);
    font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;
    transition:.1s;
  }
  .manual-picker-num.selected{color:#fff;border-color:transparent;}
  .manual-picker-actions{display:flex;align-items:center;gap:10px;}
  .manual-picker-actions span{font-size:13px;color:var(--ink-soft);font-weight:700;margin-right:auto;}
  .manual-picker-actions button{
    padding:10px 16px;border-radius:8px;border:1.5px solid var(--line);
    background:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;
  }
  #manualPickerAddBtn{background:var(--blue);color:#fff;border-color:var(--blue);}
  #manualPickerAddBtn:disabled{background:var(--line);border-color:var(--line);color:var(--ink-soft);cursor:not-allowed;}

  .qr-modal{
    position:fixed;inset:0;background:rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;
    z-index:1000;padding:20px;
  }
  .qr-modal-inner{
    background:#fff;border-radius:16px;padding:20px;
    max-width:420px;width:100%;max-height:90vh;overflow-y:auto;
  }
  .qr-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-weight:900;font-size:16px;}
  .qr-close-btn{border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink-soft);}
  #qrVideo{width:100%;border-radius:12px;background:#000;}
  .qr-error{color:var(--ball3);font-size:13px;margin-top:10px;}
  .qr-result{margin-top:14px;}
  .qr-game-row{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;}
  .qr-found-title{font-size:13.5px;font-weight:700;margin-bottom:8px;}
  .qr-add-btn{
    width:100%;margin-top:10px;padding:12px;
    background:var(--blue);color:#fff;border:none;border-radius:10px;
    font-weight:900;font-size:14px;cursor:pointer;font-family:inherit;
  }
  .qr-retry-btn{
    margin-top:10px;padding:10px 16px;border-radius:8px;
    border:1.5px solid var(--line);background:#fff;font-weight:700;
    cursor:pointer;font-family:inherit;
  }

  .draw-card{
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:12px;
  }
  .draw-meta{display:flex;align-items:center;gap:8px;}
  .draw-chip{
    display:flex;align-items:center;gap:5px;
    background:var(--blue-soft);color:var(--blue-deep);
    font-weight:700;font-size:13px;
    padding:7px 14px;border-radius:999px;
    white-space:nowrap;
  }

  .note{
    font-size:13px;color:var(--ink-soft);
    background:var(--blue-soft);
    border-radius:10px;
    padding:14px 16px;
    margin-top:10px;
  }

  .stat-section{margin-bottom:20px;}
  .stat-section:last-child{margin-bottom:0;}
  .stat-title{font-size:14px;font-weight:700;color:var(--ink-soft);margin-bottom:10px;}
  .stat-balls{display:flex;flex-wrap:wrap;gap:10px;}
  .stat-item{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .stat-item .ball{width:32px;height:32px;font-size:13px;}
  .stat-item .sub{font-size:11px;color:var(--ink-soft);}
  .stat-meta{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}

  footer{
    text-align:center;padding:30px 0 40px;
    font-size:13px;color:var(--ink-soft);
  }

  .support-card{text-align:center;}
  .support-emoji{font-size:32px;margin-bottom:8px;}
  .support-desc{font-size:13.5px;color:var(--ink-soft);margin:0 0 18px;}
  .support-btn{
    display:inline-block;
    padding:14px 28px;
    background:var(--gold);color:#20232B;
    border-radius:12px;
    font-weight:900;font-size:15px;
    text-decoration:none;
    transition:.15s;
  }
  .support-btn:hover{opacity:.85;}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>번호 생성기</h1>
    <p>방식을 고르고, 원하는 만큼 뽑아보세요</p>
  </div>
</header>

<div class="dday-wrap">
  <span class="dday-badge" id="ddayBadge">불러오는 중...</span>
</div>

<div class="wrap">

  <div class="card" id="myNumbersCard">
    <div class="my-num-header">
      <h2>내 번호</h2>
      <div class="my-num-header-actions">
        <button class="mini-action-btn" onclick="openQrScanner()">📷 QR 스캔으로 추가</button>
        <button class="mini-action-btn" onclick="openManualPicker()">🎟 번호 선택해서 구입</button>
      </div>
    </div>
    <div id="myNumbersBody"></div>
    <div class="manual-picker" id="manualPickerPanel" style="display:none;">
      <div class="manual-picker-grid" id="manualPickerGrid"></div>
      <div class="manual-picker-actions">
        <span id="manualPickerCount">0/6 선택</span>
        <button onclick="closeManualPicker()">취소</button>
        <button id="manualPickerAddBtn" onclick="confirmManualPicker()" disabled>추가</button>
      </div>
    </div>
  </div>

  <div class="qr-modal" id="qrModal" style="display:none;">
    <div class="qr-modal-inner">
      <div class="qr-modal-header">
        <span>QR 코드로 추가</span>
        <button class="qr-close-btn" onclick="closeQrScanner()">✕</button>
      </div>
      <video id="qrVideo" playsinline muted></video>
      <canvas id="qrCanvas" style="display:none;"></canvas>
      <div class="qr-error" id="qrError"></div>
      <div class="qr-result" id="qrResult"></div>
    </div>
  </div>

  <div class="card">
    <h2>1. 생성 방식 선택</h2>
    <div class="mode-grid" id="modeGrid">
      <button class="mode-btn active" data-mode="random">
        <div class="t">완전 무작위</div>
        <div class="d">1~45 중 순수 랜덤 6개</div>
      </button>
      <button class="mode-btn" data-mode="balance">
        <div class="t">홀짝 균형</div>
        <div class="d">홀수/짝수 3:3에 가깝게</div>
      </button>
      <button class="mode-btn" data-mode="spread">
        <div class="t">구간 고르게</div>
        <div class="d">1~15 / 16~30 / 31~45 골고루</div>
      </button>
      <button class="mode-btn" data-mode="nostreak">
        <div class="t">연속번호 최소화</div>
        <div class="d">붙어있는 숫자 최대한 배제</div>
      </button>
      <button class="mode-btn" data-mode="hot">
        <div class="t">자주 나온 번호 위주</div>
        <div class="d">전체 회차 중 출현 빈도 상위권</div>
      </button>
      <button class="mode-btn" data-mode="cold">
        <div class="t">오래 안 나온 번호 위주</div>
        <div class="d">최근 미출현 기간이 긴 번호</div>
      </button>
    </div>

    <h2>2. 게임 수</h2>
    <div class="count-row">
      <label>게임 수</label>
      <input type="range" id="countRange" min="1" max="10" value="5" step="1">
      <div class="n" id="countOut">5</div>
    </div>

    <button class="gen-btn" onclick="generate()">번호 생성하기</button>

    <div class="results" id="results"></div>
    <button class="copy-all-btn" id="copyAllBtn" onclick="copyAll()">전체 복사</button>
  </div>

  <div class="card">
    <h2>최근 당첨번호</h2>
    <div class="draw-card">
      <div class="balls" id="lastDrawBalls"></div>
      <div class="draw-meta" id="lastDrawMeta">불러오는 중...</div>
    </div>
  </div>

  <div class="card">
    <h2>번호별 출현 통계</h2>
    <div id="statsBody">
      <div class="note">데이터를 불러오는 중이에요...</div>
    </div>
  </div>

  <div class="card support-card">
    <div class="support-emoji">☕</div>
    <h2>이 도구가 도움이 되셨나요?</h2>
    <p class="support-desc">커피 한 잔 값이 서버 운영과 데이터 업데이트에 큰 힘이 됩니다.</p>
    <a class="support-btn" href="https://qr.kakaopay.com/Ej8wyFmn0" target="_blank" rel="noopener">☕ 커피 한잔 후원하기</a>
  </div>

</div>

<footer>
  본 서비스는 참고용이며, 당첨을 보장하지 않습니다
</footer>

<script>
  const DATA_URL = 'https://raw.githubusercontent.com/warwickjjing/lotto_v1.0/main/data/lotto-history.json';

  let hotNumbers = [];   // 출현 빈도 상위 번호 (많이 나온 순)
  let coldNumbers = [];  // 최근 미출현 기간이 긴 번호 (오래 안 나온 순)
  let dataReady = false;
  let lastResults = [];
  let latestRoundGlobal = null;
  let historyGlobal = [];

  function getRoundEntry(round){
    return historyGlobal.find(e=> e.drwNo === round) || null;
  }

  const SAVE_KEY = 'lotto_saved_numbers';
  function loadSavedNumbers(){
    try{ return JSON.parse(localStorage.getItem(SAVE_KEY)) || []; }catch(e){ return []; }
  }
  function persistSavedNumbers(){
    try{ localStorage.setItem(SAVE_KEY, JSON.stringify(savedNumbers)); }catch(e){}
  }
  let savedNumbers = loadSavedNumbers();
  let myNumbersPage = 0;
  const MY_NUMBERS_PAGE_SIZE = 5;

  // targetRound: 이 조합이 겨냥하는 특정 회차. 항상 "그 회차"의 고정된 결과와만 비교하므로
  // 이후 회차가 아무리 늘어나도 한 번 나온 당첨 결과가 바뀌어 보이지 않는다.
  function saveNumbers(nums, targetRound){
    const resolved = targetRound !== undefined ? targetRound : (dataReady ? latestRoundGlobal + 1 : null);
    savedNumbers.unshift({ numbers: nums, targetRound: resolved });
    persistSavedNumbers();
    myNumbersPage = 0;
    renderMyNumbers();
  }

  function calcRank(matchCount, bonusMatch){
    if(matchCount === 6) return '1등';
    if(matchCount === 5 && bonusMatch) return '2등';
    if(matchCount === 5) return '3등';
    if(matchCount === 4) return '4등';
    if(matchCount === 3) return '5등';
    return null;
  }

  function renderMyNumbers(){
    const body = document.getElementById('myNumbersBody');
    body.innerHTML = '';

    if(savedNumbers.length === 0){
      body.innerHTML = '<div class="note">아직 구입한 번호가 없어요. 번호를 생성해서 구입 버튼을 누르거나, QR 스캔 / 번호 선택으로 추가해보세요.</div>';
      return;
    }

    const totalPages = Math.max(1, Math.ceil(savedNumbers.length / MY_NUMBERS_PAGE_SIZE));
    if(myNumbersPage >= totalPages) myNumbersPage = totalPages - 1;
    if(myNumbersPage < 0) myNumbersPage = 0;
    const start = myNumbersPage * MY_NUMBERS_PAGE_SIZE;
    const pageItems = savedNumbers.slice(start, start + MY_NUMBERS_PAGE_SIZE);

    pageItems.forEach((item, i)=>{
      const realIdx = start + i;
      const row = document.createElement('div');
      row.className = 'my-num-row';

      const targetEntry = (dataReady && item.targetRound !== null) ? getRoundEntry(item.targetRound) : null;
      const isPending = !targetEntry;

      const top = document.createElement('div');
      top.className = 'my-num-top';

      const ballsWrap = document.createElement('div');
      ballsWrap.className = 'balls';
      item.numbers.forEach(n=>{
        const b = makeBall(n);
        if(!isPending){
          if(targetEntry.numbers.includes(n)){
            b.classList.add('matched');
          }else if(n === targetEntry.bonus){
            b.classList.add('bonus-matched');
          }
        }
        ballsWrap.appendChild(b);
      });
      top.appendChild(ballsWrap);

      const delBtn = document.createElement('button');
      delBtn.className = 'my-num-del';
      delBtn.textContent = '삭제';
      delBtn.addEventListener('click', ()=>{
        savedNumbers.splice(realIdx, 1);
        persistSavedNumbers();
        renderMyNumbers();
      });
      top.appendChild(delBtn);

      row.appendChild(top);

      const status = document.createElement('div');
      status.className = 'my-num-status';
      if(!dataReady){
        status.textContent = '최신 회차 확인 중...';
      }else if(isPending){
        status.textContent = item.targetRound !== null
          ? `⏳ ${item.targetRound}회 추첨 결과를 기다리는 중이에요`
          : '⏳ 다음 추첨 결과를 기다리는 중이에요';
      }else{
        const matchCount = item.numbers.filter(n=> targetEntry.numbers.includes(n)).length;
        const bonusMatch = item.numbers.includes(targetEntry.bonus);
        const rank = calcRank(matchCount, bonusMatch);
        status.textContent = rank
          ? `🎉 ${matchCount}개 일치! ${rank} 당첨권이에요 (${item.targetRound}회 기준)`
          : `${matchCount}개 일치 · 아쉽게 낙첨 (${item.targetRound}회 기준)`;
        if(rank) status.classList.add('win');
      }
      row.appendChild(status);

      if(!isPending){
        const tooltip = document.createElement('div');
        tooltip.className = 'my-num-tooltip';

        const tooltipTitle = document.createElement('div');
        tooltipTitle.className = 'tooltip-title';
        tooltipTitle.textContent = `${item.targetRound}회 당첨번호`;
        tooltip.appendChild(tooltipTitle);

        const tooltipBalls = document.createElement('div');
        tooltipBalls.className = 'balls';
        targetEntry.numbers.forEach(n=> tooltipBalls.appendChild(makeBall(n, 28)));
        const plus = document.createElement('div');
        plus.style.cssText = 'display:flex;align-items:center;color:#fff;font-weight:700;opacity:.7;';
        plus.textContent = '+';
        tooltipBalls.appendChild(plus);
        tooltipBalls.appendChild(makeBall(targetEntry.bonus, 28));
        tooltip.appendChild(tooltipBalls);

        row.appendChild(tooltip);
      }

      body.appendChild(row);
    });

    if(totalPages > 1){
      const pager = document.createElement('div');
      pager.className = 'my-num-pager';

      const prevBtn = document.createElement('button');
      prevBtn.textContent = '‹ 이전';
      prevBtn.disabled = myNumbersPage === 0;
      prevBtn.addEventListener('click', ()=>{ myNumbersPage--; renderMyNumbers(); });
      pager.appendChild(prevBtn);

      const pageLabel = document.createElement('span');
      pageLabel.textContent = `${myNumbersPage + 1} / ${totalPages}`;
      pager.appendChild(pageLabel);

      const nextBtn = document.createElement('button');
      nextBtn.textContent = '다음 ›';
      nextBtn.disabled = myNumbersPage >= totalPages - 1;
      nextBtn.addEventListener('click', ()=>{ myNumbersPage++; renderMyNumbers(); });
      pager.appendChild(nextBtn);

      body.appendChild(pager);
    }
  }

  let manualPickerSelected = [];

  function openManualPicker(){
    manualPickerSelected = [];
    const grid = document.getElementById('manualPickerGrid');
    grid.innerHTML = '';
    for(let n=1;n<=45;n++){
      const btn = document.createElement('button');
      btn.className = 'manual-picker-num';
      btn.type = 'button';
      btn.textContent = n;
      btn.addEventListener('click', ()=> toggleManualPick(n, btn));
      grid.appendChild(btn);
    }
    updateManualPickerUI();
    document.getElementById('manualPickerPanel').style.display = 'block';
  }

  function toggleManualPick(n, btn){
    const i = manualPickerSelected.indexOf(n);
    if(i >= 0){
      manualPickerSelected.splice(i, 1);
      btn.classList.remove('selected');
      btn.style.background = '';
    }else{
      if(manualPickerSelected.length >= 6) return;
      manualPickerSelected.push(n);
      btn.classList.add('selected');
      btn.style.background = BALL_COLORS(n);
    }
    updateManualPickerUI();
  }

  function updateManualPickerUI(){
    document.getElementById('manualPickerCount').textContent = `${manualPickerSelected.length}/6 선택`;
    document.getElementById('manualPickerAddBtn').disabled = manualPickerSelected.length !== 6;
  }

  function confirmManualPicker(){
    saveNumbers([...manualPickerSelected].sort((a,b)=>a-b));
    closeManualPicker();
  }

  function closeManualPicker(){
    document.getElementById('manualPickerPanel').style.display = 'none';
  }

  // 동행복권 QR (m.dhlottery.co.kr/qr.do?...&v=RRRRqNNNNNNNNNNNNq...) 포맷:
  // v= 뒤 첫 4자리가 회차, 이후 q로 구분된 12자리(6개×2자리) 블록마다 한 게임.
  function parseLottoQR(text){
    const match = text.match(/[?&]v=([^&]+)/);
    const raw = match ? decodeURIComponent(match[1]) : text;
    const chunks = raw.split(/[^0-9]+/).filter(Boolean);
    const round = chunks.length > 0 ? parseInt(chunks[0], 10) : null;
    const games = [];
    chunks.forEach(chunk=>{
      if(chunk.length !== 12) return;
      const nums = [];
      for(let i=0;i<12;i+=2){
        nums.push(parseInt(chunk.slice(i,i+2), 10));
      }
      const unique = new Set(nums);
      const valid = nums.every(n=> n>=1 && n<=45) && unique.size === 6;
      if(valid) games.push(nums.sort((a,b)=>a-b));
    });
    return { round: Number.isFinite(round) ? round : null, games };
  }

  let qrStream = null;
  let qrRafId = null;

  function loadJsQR(){
    return new Promise((resolve, reject)=>{
      if(window.jsQR){ resolve(); return; }
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
      script.onload = ()=> resolve();
      script.onerror = ()=> reject(new Error('jsQR 로드 실패'));
      document.head.appendChild(script);
    });
  }

  async function openQrScanner(){
    const modal = document.getElementById('qrModal');
    const video = document.getElementById('qrVideo');
    const errEl = document.getElementById('qrError');
    const resultEl = document.getElementById('qrResult');
    resultEl.innerHTML = '';
    errEl.textContent = '';
    video.style.display = '';
    modal.style.display = 'flex';
    try{
      await loadJsQR();
      qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      video.srcObject = qrStream;
      await video.play();
      qrRafId = requestAnimationFrame(scanQrFrame);
    }catch(e){
      errEl.textContent = '카메라를 사용할 수 없어요. 권한을 확인하거나 다른 브라우저에서 시도해보세요.';
    }
  }

  function scanQrFrame(){
    const video = document.getElementById('qrVideo');
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      const canvas = document.getElementById('qrCanvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = window.jsQR(imageData.data, imageData.width, imageData.height);
      if(code){
        handleQrDecoded(code.data);
        return;
      }
    }
    qrRafId = requestAnimationFrame(scanQrFrame);
  }

  function stopQrStream(){
    if(qrRafId){ cancelAnimationFrame(qrRafId); qrRafId = null; }
    if(qrStream){
      qrStream.getTracks().forEach(t=> t.stop());
      qrStream = null;
    }
  }

  function closeQrScanner(){
    document.getElementById('qrModal').style.display = 'none';
    stopQrStream();
  }

  function handleQrDecoded(text){
    stopQrStream();
    const { round, games } = parseLottoQR(text);
    const resultEl = document.getElementById('qrResult');
    document.getElementById('qrVideo').style.display = 'none';
    resultEl.innerHTML = '';

    if(games.length === 0){
      resultEl.innerHTML = '<div class="note">번호를 인식하지 못했어요. 다시 시도하거나 번호 선택으로 직접 추가해주세요.</div>';
      const retryBtn = document.createElement('button');
      retryBtn.className = 'qr-retry-btn';
      retryBtn.textContent = '다시 스캔';
      retryBtn.addEventListener('click', openQrScanner);
      resultEl.appendChild(retryBtn);
      return;
    }

    const resolvedRound = round !== null ? round : (dataReady ? latestRoundGlobal + 1 : null);

    const title = document.createElement('div');
    title.className = 'qr-found-title';
    title.textContent = round !== null
      ? `${round}회 응모권에서 ${games.length}개 조합을 찾았어요. 추가할 항목을 선택하세요.`
      : `회차를 인식하지 못해 ${resolvedRound ?? '다음'}회 기준으로 등록돼요. ${games.length}개 조합을 찾았어요.`;
    resultEl.appendChild(title);

    games.forEach((nums, i)=>{
      const row = document.createElement('label');
      row.className = 'qr-game-row';
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = true;
      checkbox.dataset.idx = i;
      row.appendChild(checkbox);
      const ballsWrap = document.createElement('span');
      ballsWrap.className = 'balls';
      nums.forEach(n=> ballsWrap.appendChild(makeBall(n, 28)));
      row.appendChild(ballsWrap);
      resultEl.appendChild(row);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'qr-add-btn';
    addBtn.textContent = '선택한 조합 추가';
    addBtn.addEventListener('click', ()=>{
      resultEl.querySelectorAll('input[type=checkbox]:checked').forEach(cb=>{
        saveNumbers(games[parseInt(cb.dataset.idx, 10)], resolvedRound);
      });
      closeQrScanner();
    });
    resultEl.appendChild(addBtn);
  }

  const BALL_COLORS = n => {
    if(n<=10) return 'var(--ball1)';
    if(n<=20) return 'var(--ball2)';
    if(n<=30) return 'var(--ball3)';
    if(n<=40) return 'var(--ball4)';
    return 'var(--ball5)';
  };

  function makeBall(n, size){
    const b = document.createElement('div');
    b.className = 'ball';
    b.textContent = n;
    b.style.background = BALL_COLORS(n);
    if(size) b.style.cssText += `width:${size}px;height:${size}px;font-size:${Math.round(size*0.4)}px;`;
    return b;
  }

  async function loadStats(){
    try{
      const res = await fetch(DATA_URL);
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const history = await res.json();
      if(!Array.isArray(history) || history.length === 0) throw new Error('데이터 비어있음');

      historyGlobal = history;
      const latestEntry = history[history.length - 1];
      latestRoundGlobal = latestEntry.drwNo;

      renderLastDraw(latestEntry);
      computeStats(history);
      dataReady = true;
      renderMyNumbers();
    }catch(e){
      document.getElementById('lastDrawMeta').textContent = '데이터를 불러오지 못했어요';
      document.getElementById('statsBody').innerHTML =
        '<div class="note">통계 데이터를 불러오지 못했어요. 잠시 후 새로고침 해보세요. (' + e.message + ')</div>';
    }
  }

  function computeStats(history){
    const freq = Array(46).fill(0);
    const lastSeenRound = Array(46).fill(0);

    history.forEach(entry=>{
      entry.numbers.forEach(n=>{
        freq[n]++;
        lastSeenRound[n] = entry.drwNo;
      });
    });

    const latestRound = history[history.length - 1].drwNo;

    const hotList = Array.from({length:45}, (_,i)=>i+1)
      .sort((a,b)=> freq[b]-freq[a])
      .slice(0,10);

    const coldList = Array.from({length:45}, (_,i)=>i+1)
      .sort((a,b)=> lastSeenRound[a]-lastSeenRound[b])
      .slice(0,10);

    hotNumbers = Array.from({length:45}, (_,i)=>i+1).sort((a,b)=> freq[b]-freq[a]).slice(0,20);
    coldNumbers = Array.from({length:45}, (_,i)=>i+1).sort((a,b)=> lastSeenRound[a]-lastSeenRound[b]).slice(0,20);

    const statsBody = document.getElementById('statsBody');
    statsBody.innerHTML = '';

    const meta = document.createElement('div');
    meta.className = 'stat-meta';
    meta.textContent = `총 ${history.length}개 회차(1~${latestRound}회) 기준`;
    statsBody.appendChild(meta);

    const hotSection = document.createElement('div');
    hotSection.className = 'stat-section';
    const hotTitle = document.createElement('div');
    hotTitle.className = 'stat-title';
    hotTitle.textContent = '자주 나온 번호 TOP 10';
    hotSection.appendChild(hotTitle);
    const hotBalls = document.createElement('div');
    hotBalls.className = 'stat-balls';
    hotList.forEach(n=>{
      const item = document.createElement('div');
      item.className = 'stat-item';
      item.appendChild(makeBall(n));
      const sub = document.createElement('div');
      sub.className = 'sub';
      sub.textContent = freq[n] + '회';
      item.appendChild(sub);
      hotBalls.appendChild(item);
    });
    hotSection.appendChild(hotBalls);
    statsBody.appendChild(hotSection);

    const coldSection = document.createElement('div');
    coldSection.className = 'stat-section';
    const coldTitle = document.createElement('div');
    coldTitle.className = 'stat-title';
    coldTitle.textContent = '오래 안 나온 번호 TOP 10';
    coldSection.appendChild(coldTitle);
    const coldBalls = document.createElement('div');
    coldBalls.className = 'stat-balls';
    coldList.forEach(n=>{
      const item = document.createElement('div');
      item.className = 'stat-item';
      item.appendChild(makeBall(n));
      const sub = document.createElement('div');
      sub.className = 'sub';
      sub.textContent = (latestRound - lastSeenRound[n]) + '회째';
      item.appendChild(sub);
      coldBalls.appendChild(item);
    });
    coldSection.appendChild(coldBalls);
    statsBody.appendChild(coldSection);
  }

  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  const countRange = document.getElementById('countRange');
  const countOut = document.getElementById('countOut');
  countRange.addEventListener('input', ()=>{ countOut.textContent = countRange.value; });

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function genRandom(){
    const pool = Array.from({length:45},(_,i)=>i+1);
    return shuffle(pool).slice(0,6).sort((a,b)=>a-b);
  }

  function genBalance(){
    for(let tries=0; tries<200; tries++){
      const nums = genRandom();
      const odd = nums.filter(n=>n%2===1).length;
      if(odd===3 || odd===4 || odd===2) return nums;
    }
    return genRandom();
  }

  function genSpread(){
    for(let tries=0; tries<200; tries++){
      const nums = genRandom();
      const low = nums.filter(n=>n<=15).length;
      const mid = nums.filter(n=>n>15&&n<=30).length;
      const high = nums.filter(n=>n>30).length;
      if(low>=1 && mid>=1 && high>=1) return nums;
    }
    return genRandom();
  }

  function genNoStreak(){
    for(let tries=0; tries<200; tries++){
      const nums = genRandom();
      let streaks = 0;
      for(let i=0;i<nums.length-1;i++){
        if(nums[i+1]-nums[i]===1) streaks++;
      }
      if(streaks<=1) return nums;
    }
    return genRandom();
  }

  function genFromPool(pool){
    if(!dataReady || pool.length < 6) return genRandom();
    const shuffled = shuffle([...pool]);
    return shuffled.slice(0,6).sort((a,b)=>a-b);
  }

  function genHot(){ return genFromPool(hotNumbers); }
  function genCold(){ return genFromPool(coldNumbers); }

  function generate(){
    const mode = document.querySelector('.mode-btn.active').dataset.mode;
    const count = parseInt(countRange.value, 10);
    const genFn = { random: genRandom, balance: genBalance, spread: genSpread, nostreak: genNoStreak, hot: genHot, cold: genCold }[mode];

    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '';
    lastResults = [];

    for(let i=0;i<count;i++){
      const nums = genFn();
      lastResults.push(nums);
      const row = document.createElement('div');
      row.className = 'result-row';

      const idx = document.createElement('div');
      idx.className = 'result-idx';
      idx.textContent = (i+1) + '.';
      row.appendChild(idx);

      const balls = document.createElement('div');
      balls.className = 'balls';
      nums.forEach(n=>{
        const b = document.createElement('div');
        b.className = 'ball';
        b.textContent = n;
        b.style.background = BALL_COLORS(n);
        balls.appendChild(b);
      });
      row.appendChild(balls);

      const actions = document.createElement('div');
      actions.className = 'row-actions';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = '복사';
      copyBtn.addEventListener('click', ()=>{
        navigator.clipboard.writeText(nums.join(', '));
        copyBtn.textContent = '복사됨!';
        copyBtn.classList.add('copied');
        setTimeout(()=>{
          copyBtn.textContent = '복사';
          copyBtn.classList.remove('copied');
        }, 1500);
      });
      actions.appendChild(copyBtn);

      const buyBtn = document.createElement('button');
      buyBtn.className = 'buy-btn';
      buyBtn.textContent = '🎟 구입';
      buyBtn.addEventListener('click', ()=>{
        saveNumbers(nums);
        buyBtn.textContent = '구입됨!';
        buyBtn.classList.add('bought');
        setTimeout(()=>{
          buyBtn.textContent = '🎟 구입';
          buyBtn.classList.remove('bought');
        }, 1500);
      });
      actions.appendChild(buyBtn);

      row.appendChild(actions);

      resultsEl.appendChild(row);
    }
  }

  function copyAll(){
    const btn = document.getElementById('copyAllBtn');
    const text = lastResults.map((nums,i)=> `${i+1}. ${nums.join(', ')}`).join('\n');
    navigator.clipboard.writeText(text);
    btn.textContent = '전체 복사됨!';
    btn.classList.add('copied');
    setTimeout(()=>{
      btn.textContent = '전체 복사';
      btn.classList.remove('copied');
    }, 1500);
  }

  function renderDDay(){
    const el = document.getElementById('ddayBadge');
    const now = new Date();
    const day = now.getDay();
    const drawTime = new Date(now);
    drawTime.setHours(20, 35, 0, 0);

    if(day === 6 && now < drawTime){
      const hours = Math.max(1, Math.ceil((drawTime - now) / 3600000));
      el.textContent = `🔥 오늘 밤 ${hours}시간 뒤 추첨!`;
      el.classList.add('urgent');
      return;
    }

    let daysUntil = (6 - day + 7) % 7;
    if(daysUntil === 0) daysUntil = 7;
    el.textContent = `다음 추첨까지 D-${daysUntil}`;
    el.classList.remove('urgent');
  }

  function formatKoreanDate(isoDate){
    const [y, m, d] = isoDate.split('T')[0].split('-');
    return `${y}년 ${parseInt(m,10)}월 ${parseInt(d,10)}일`;
  }

  function renderLastDraw(entry){
    const el = document.getElementById('lastDrawBalls');
    el.innerHTML = '';
    entry.numbers.forEach(n=> el.appendChild(makeBall(n)));

    const plus = document.createElement('div');
    plus.style.cssText = 'display:flex;align-items:center;color:var(--ink-soft);font-weight:700;';
    plus.textContent = '+';
    el.appendChild(plus);
    el.appendChild(makeBall(entry.bonus));

    document.getElementById('lastDrawMeta').innerHTML =
      `<span class="draw-chip">${entry.drwNo}회 · 📅 ${formatKoreanDate(entry.date)}</span>`;
  }

  renderMyNumbers();
  renderDDay();
  setInterval(renderDDay, 60000);
  loadStats();
  generate();
</script>
