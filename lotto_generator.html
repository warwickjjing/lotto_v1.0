<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 번호 생성기 — 다양한 방식으로 뽑아보세요</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#20232B;
    --ink-soft:#565B68;
    --paper:#F5F6F8;
    --line:#E1E3E9;
    --blue:#3B7BE0;
    --blue-deep:#2A5CB0;
    --blue-soft:#E8F0FD;
    --gold:#F2A93B;
    --ball1:#F6C144;
    --ball2:#5CA8ED;
    --ball3:#F26B6B;
    --ball4:#8D95A3;
    --ball5:#5EBE7A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    line-height:1.7;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 20px;}

  header{padding:36px 0 20px;text-align:center;}
  header h1{font-size:26px;font-weight:900;margin:0 0 8px;}
  header p{font-size:15px;color:var(--ink-soft);margin:0;}

  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:16px;
    padding:26px 24px;
    margin-bottom:22px;
  }
  .card h2{font-size:17px;font-weight:700;margin:0 0 16px;}

  .mode-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:20px;
  }
  @media(max-width:480px){.mode-grid{grid-template-columns:1fr;}}
  .mode-btn{
    padding:14px 12px;
    border:2px solid var(--line);
    border-radius:12px;
    background:#fff;
    cursor:pointer;
    text-align:left;
    font-family:inherit;
  }
  .mode-btn.active{border-color:var(--blue);background:var(--blue-soft);}
  .mode-btn .t{font-weight:700;font-size:15px;margin-bottom:3px;}
  .mode-btn .d{font-size:12.5px;color:var(--ink-soft);}

  .count-row{
    display:flex;align-items:center;gap:14px;margin-bottom:20px;
  }
  .count-row label{font-size:14px;font-weight:700;color:var(--ink-soft);}
  .count-row input[type=range]{flex:1;}
  .count-row .n{font-weight:900;font-size:18px;min-width:20px;text-align:center;}

  .gen-btn{
    width:100%;padding:18px;
    background:var(--blue);color:#fff;
    border:none;border-radius:12px;
    font-size:18px;font-weight:900;
    cursor:pointer;
  }
  .gen-btn:hover{background:var(--blue-deep);}
  .gen-btn:active{transform:scale(0.99);}

  .results{margin-top:22px;}
  .result-row{
    display:flex;align-items:center;gap:10px;
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .result-row:last-child{border-bottom:none;}
  .result-idx{font-size:13px;color:var(--ink-soft);width:20px;flex-shrink:0;}
  .balls{display:flex;gap:6px;flex-wrap:wrap;}
  .ball{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:900;font-size:14.5px;
    flex-shrink:0;
  }

  .draw-card{
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:12px;
  }
  .draw-meta{font-size:13.5px;color:var(--ink-soft);}
  .draw-meta b{color:var(--ink);}

  .note{
    font-size:13px;color:var(--ink-soft);
    background:var(--blue-soft);
    border-radius:10px;
    padding:14px 16px;
    margin-top:10px;
  }

  footer{
    text-align:center;padding:30px 0 40px;
    font-size:13px;color:var(--ink-soft);
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>번호 생성기</h1>
    <p>방식을 고르고, 원하는 만큼 뽑아보세요</p>
  </div>
</header>

<div class="wrap">

  <div class="card">
    <h2>1. 생성 방식 선택</h2>
    <div class="mode-grid" id="modeGrid">
      <button class="mode-btn active" data-mode="random">
        <div class="t">완전 무작위</div>
        <div class="d">1~45 중 순수 랜덤 6개</div>
      </button>
      <button class="mode-btn" data-mode="balance">
        <div class="t">홀짝 균형</div>
        <div class="d">홀수/짝수 3:3에 가깝게</div>
      </button>
      <button class="mode-btn" data-mode="spread">
        <div class="t">구간 고르게</div>
        <div class="d">1~15 / 16~30 / 31~45 골고루</div>
      </button>
      <button class="mode-btn" data-mode="nostreak">
        <div class="t">연속번호 최소화</div>
        <div class="d">붙어있는 숫자 최대한 배제</div>
      </button>
    </div>

    <h2>2. 게임 수</h2>
    <div class="count-row">
      <label>게임 수</label>
      <input type="range" id="countRange" min="1" max="10" value="5" step="1">
      <div class="n" id="countOut">5</div>
    </div>

    <button class="gen-btn" onclick="generate()">번호 생성하기</button>

    <div class="results" id="results"></div>
  </div>

  <div class="card">
    <h2>최근 확인된 당첨번호</h2>
    <div class="draw-card">
      <div class="balls" id="lastDrawBalls"></div>
      <div class="draw-meta"><b>1204회</b> 기준 (예시 데이터)</div>
    </div>
    <div class="note">
      전체 회차 통계 분석 기능은 별도로 제공되는 자동 수집 스크립트를 연결하면 활성화됩니다. 현재는 최근 확인된 1개 회차만 예시로 표시하고 있어요.
    </div>
  </div>

</div>

<footer>
  본 서비스는 참고용이며, 당첨을 보장하지 않습니다
</footer>

<script>
  const BALL_COLORS = n => {
    if(n<=10) return 'var(--ball1)';
    if(n<=20) return 'var(--ball2)';
    if(n<=30) return 'var(--ball3)';
    if(n<=40) return 'var(--ball4)';
    return 'var(--ball5)';
  };

  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  const countRange = document.getElementById('countRange');
  const countOut = document.getElementById('countOut');
  countRange.addEventListener('input', ()=>{ countOut.textContent = countRange.value; });

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function genRandom(){
    const pool = Array.from({length:45},(_,i)=>i+1);
    return shuffle(pool).slice(0,6).sort((a,b)=>a-b);
  }

  function genBalance(){
    for(let tries=0; tries<200; tries++){
      const nums = genRandom();
      const odd = nums.filter(n=>n%2===1).length;
      if(odd===3 || odd===4 || odd===2) return nums;
    }
    return genRandom();
  }

  function genSpread(){
    for(let tries=0; tries<200; tries++){
      const nums = genRandom();
      const low = nums.filter(n=>n<=15).length;
      const mid = nums.filter(n=>n>15&&n<=30).length;
      const high = nums.filter(n=>n>30).length;
      if(low>=1 && mid>=1 && high>=1) return nums;
    }
    return genRandom();
  }

  function genNoStreak(){
    for(let tries=0; tries<200; tries++){
      const nums = genRandom();
      let streaks = 0;
      for(let i=0;i<nums.length-1;i++){
        if(nums[i+1]-nums[i]===1) streaks++;
      }
      if(streaks<=1) return nums;
    }
    return genRandom();
  }

  function generate(){
    const mode = document.querySelector('.mode-btn.active').dataset.mode;
    const count = parseInt(countRange.value, 10);
    const genFn = { random: genRandom, balance: genBalance, spread: genSpread, nostreak: genNoStreak }[mode];

    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '';

    for(let i=0;i<count;i++){
      const nums = genFn();
      const row = document.createElement('div');
      row.className = 'result-row';

      const idx = document.createElement('div');
      idx.className = 'result-idx';
      idx.textContent = (i+1) + '.';
      row.appendChild(idx);

      const balls = document.createElement('div');
      balls.className = 'balls';
      nums.forEach(n=>{
        const b = document.createElement('div');
        b.className = 'ball';
        b.textContent = n;
        b.style.background = BALL_COLORS(n);
        balls.appendChild(b);
      });
      row.appendChild(balls);

      resultsEl.appendChild(row);
    }
  }

  function renderLastDraw(){
    const nums = [8,16,28,30,31,44];
    const bonus = 27;
    const el = document.getElementById('lastDrawBalls');
    nums.forEach(n=>{
      const b = document.createElement('div');
      b.className = 'ball';
      b.textContent = n;
      b.style.background = BALL_COLORS(n);
      el.appendChild(b);
    });
    const plus = document.createElement('div');
    plus.style.cssText = 'display:flex;align-items:center;color:var(--ink-soft);font-weight:700;';
    plus.textContent = '+';
    el.appendChild(plus);
    const bb = document.createElement('div');
    bb.className = 'ball';
    bb.textContent = bonus;
    bb.style.background = BALL_COLORS(bonus);
    el.appendChild(bb);
  }

  renderLastDraw();
  generate();
</script>

</body>
</html>
